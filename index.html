<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALL ODDS | Puntrr.ai Alternative by FENG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'obsidian-base': '#050505',
                        'obsidian-surface': '#121212',
                        'obsidian-card': '#1a1a1a',
                        'neon-accent': '#00ffcc',
                        'puntrr-blue': '#2563eb',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
        .probability-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="bg-obsidian-base text-gray-100 font-sans min-h-screen">

    <nav class="bg-obsidian-surface border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-widest text-white">ALL ODDS <span class="text-neon-accent text-sm">AI</span></h1>
                <p class="text-[10px] tracking-widest text-gray-400 uppercase">Engineered by FENG Industries</p>
            </div>
            <div class="flex gap-4">
                <div class="text-xs border border-green-500/30 bg-green-500/10 text-green-400 px-3 py-1.5 rounded flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    Live API Connected
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">

        <div class="lg:col-span-3 space-y-2">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Top 10 Leagues</h2>
            <div id="leagueFilters" class="space-y-1">
                </div>
        </div>

        <div class="lg:col-span-6 h-[85vh] overflow-y-auto pr-2" id="matchesContainer">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-white">Today's Fixtures & AI Data</h2>
                <button onclick="fetchRealGames()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded transition-colors">↻ Refresh Real Web Data</button>
            </div>
            
            <div id="loadingState" class="hidden text-center py-10">
                <div class="w-8 h-8 border-2 border-neon-accent border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-sm text-gray-400">Scraping live global odds...</p>
            </div>

            <div id="matchFeed" class="space-y-6">
                </div>
        </div>

        <div class="lg:col-span-3">
            <div class="bg-obsidian-surface border border-gray-800 rounded-xl p-4 sticky top-24 shadow-2xl">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                    <h2 class="text-sm font-bold text-white uppercase tracking-wider">Slip Builder</h2>
                    <span id="slipCount" class="bg-neon-accent text-black text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>

                <div id="slipItems" class="space-y-2 mb-4 max-h-[40vh] overflow-y-auto">
                    <p id="emptySlip" class="text-xs text-gray-500 text-center py-4">Select odds from matches to build your slip.</p>
                </div>

                <div class="border-t border-gray-800 pt-3 space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Total Odds:</span>
                        <span id="totalOddsText" class="text-white font-mono font-bold">0.00</span>
                    </div>

                    <div class="flex gap-2">
                        <select id="bookieSelect" class="bg-obsidian-base border border-gray-700 text-xs text-white rounded p-2 flex-1 outline-none focus:border-neon-accent">
                            <option value="SportyBet">SportyBet</option>
                            <option value="Bet9ja">Bet9ja</option>
                            <option value="1xBet">1xBet</option>
                        </select>
                        <button onclick="generateCode()" class="bg-neon-accent text-black font-bold text-xs px-4 rounded hover:bg-teal-400 transition-colors">
                            Get Code
                        </button>
                    </div>

                    <div id="generatedCodeBox" class="hidden bg-obsidian-base border border-dashed border-neon-accent p-3 rounded text-center">
                        <p class="text-[10px] text-gray-400 mb-1 uppercase">Your <span id="displayBookie"></span> Code</p>
                        <p id="finalCode" class="text-lg font-mono text-neon-accent font-bold tracking-widest"></p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 1. Top 10 Leagues Data ---
        const topLeagues = [
            "Premier League (ENG)", "La Liga (ESP)", "Serie A (ITA)", 
            "Bundesliga (GER)", "Ligue 1 (FRA)", "Eredivisie (NED)", 
            "Primeira Liga (POR)", "MLS (USA)", "Brasileirão (BRA)", "Champions League"
        ];

        let activeLeague = "Premier League (ENG)";
        let portfolioSlip = {}; // Tracks user's selected odds

        // Initialize League Sidebar
        const leagueContainer = document.getElementById('leagueFilters');
        topLeagues.forEach(league => {
            const btn = document.createElement('button');
            const isActive = league === activeLeague;
            btn.className = `w-full text-left px-4 py-2 text-sm rounded transition-all ${isActive ? 'bg-obsidian-surface border-l-2 border-neon-accent text-white font-bold' : 'text-gray-400 hover:bg-obsidian-surface hover:text-gray-200'}`;
            btn.innerText = league;
            btn.onclick = () => { activeLeague = league; fetchRealGames(); };
            leagueContainer.appendChild(btn);
        });

        // --- 2. Live API Fetching Logic ---
        function fetchRealGames() {
            document.getElementById('matchFeed').innerHTML = '';
            document.getElementById('loadingState').classList.remove('hidden');

            /* * IN PRODUCTION: Replace the setTimeout below with a real fetch request to an API 
             * like API-Football or The-Odds-API to pull real-time web data.
             * Example: fetch(`https://v3.football.api-sports.io/fixtures?league=${id}&next=10`)
             */

            setTimeout(() => {
                document.getElementById('loadingState').classList.add('hidden');
                renderMatches(generateMockData(activeLeague));
            }, 800);
        }

        // Simulating the data structure a real API returns ASAP
        function generateMockData(leagueName) {
            return [
                {
                    id: Math.floor(Math.random() * 10000),
                    league: leagueName,
                    home: leagueName.includes("ENG") ? "Arsenal" : leagueName.includes("ESP") ? "Real Madrid" : "Team A",
                    away: leagueName.includes("ENG") ? "Man City" : leagueName.includes("ESP") ? "Barcelona" : "Team B",
                    time: "Today, 19:45",
                    ai: { homeProb: 45, drawProb: 25, awayProb: 30, xG_Home: 2.1, xG_Away: 1.4 },
                    odds: {
                        "1": 2.10, "X": 3.40, "2": 3.10,
                        "O0.5": 1.05, "U0.5": 9.50,
                        "O1.5": 1.25, "U1.5": 3.80,
                        "O2.5": 1.75, "U2.5": 2.05,
                        "O3.5": 2.90, "U3.5": 1.40,
                        "O4.5": 4.50, "U4.5": 1.15,
                        "O5.5": 7.00, "U5.5": 1.05,
                        "O6.5": 12.00, "U6.5": 1.01
                    }
                },
                {
                    id: Math.floor(Math.random() * 10000),
                    league: leagueName,
                    home: "Home Team",
                    away: "Away Team",
                    time: "Tomorrow, 14:00",
                    ai: { homeProb: 60, drawProb: 20, awayProb: 20, xG_Home: 2.8, xG_Away: 0.9 },
                    odds: {
                        "1": 1.50, "X": 4.20, "2": 6.50,
                        "O1.5": 1.15, "U1.5": 4.80,
                        "O2.5": 1.60, "U2.5": 2.20,
                        "O3.5": 2.50, "U3.5": 1.50
                    }
                }
            ];
        }

        // --- 3. Render Matches (Puntrr Style AI UI) ---
        function renderMatches(matches) {
            const feed = document.getElementById('matchFeed');
            matches.forEach(match => {
                const isSelected = (marketKey) => portfolioSlip[match.id]?.marketKey === marketKey;
                
                const card = document.createElement('div');
                card.className = "bg-obsidian-card border border-gray-800 rounded-xl p-5 shadow-lg relative overflow-hidden";
                
                // Card HTML Construction
                let html = `
                    <div class="flex justify-between items-center border-b border-gray-800 pb-3 mb-4">
                        <span class="text-[10px] text-neon-accent font-bold uppercase tracking-wider">${match.league} • ${match.time}</span>
                        <span class="text-[10px] bg-puntrr-blue/20 text-puntrr-blue px-2 py-1 rounded font-bold">Puntrr AI Engine Active</span>
                    </div>

                    <div class="flex justify-between items-center mb-6">
                        <div class="text-lg font-bold text-white">${match.home}</div>
                        <div class="text-xs text-gray-500 font-mono">VS</div>
                        <div class="text-lg font-bold text-white">${match.away}</div>
                    </div>

                    <div class="mb-6">
                        <div class="flex justify-between text-[10px] text-gray-400 mb-1">
                            <span>Home (${match.ai.homeProb}%)</span>
                            <span>Draw (${match.ai.drawProb}%)</span>
                            <span>Away (${match.ai.awayProb}%)</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-800 rounded-full flex overflow-hidden">
                            <div class="h-full bg-neon-accent probability-bar" style="width: ${match.ai.homeProb}%"></div>
                            <div class="h-full bg-gray-500 probability-bar" style="width: ${match.ai.drawProb}%"></div>
                            <div class="h-full bg-puntrr-blue probability-bar" style="width: ${match.ai.awayProb}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] mt-2 text-gray-500">
                            <span>Expected Goals (xG): ${match.ai.xG_Home}</span>
                            <span>xG: ${match.ai.xG_Away}</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] text-gray-400 uppercase mb-2">Match Winner (1X2)</p>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="toggleBet(${match.id}, '${match.home} vs ${match.away}', 'Home Win', ${match.odds['1']}, '1')" class="border ${isSelected('1') ? 'border-neon-accent bg-neon-accent/10 text-neon-accent' : 'border-gray-700 bg-obsidian-surface text-gray-300'} p-2 rounded text-xs hover:border-gray-400 transition-colors">1 <br><span class="font-bold font-mono">${match.odds['1'].toFixed(2)}</span></button>
                                <button onclick="toggleBet(${match.id}, '${match.home} vs ${match.away}', 'Draw', ${match.odds['X']}, 'X')" class="border ${isSelected('X') ? 'border-neon-accent bg-neon-accent/10 text-neon-accent' : 'border-gray-700 bg-obsidian-surface text-gray-300'} p-2 rounded text-xs hover:border-gray-400 transition-colors">X <br><span class="font-bold font-mono">${match.odds['X'].toFixed(2)}</span></button>
                                <button onclick="toggleBet(${match.id}, '${match.home} vs ${match.away}', 'Away Win', ${match.odds['2']}, '2')" class="border ${isSelected('2') ? 'border-neon-accent bg-neon-accent/10 text-neon-accent' : 'border-gray-700 bg-obsidian-surface text-gray-300'} p-2 rounded text-xs hover:border-gray-400 transition-colors">2 <br><span class="font-bold font-mono">${match.odds['2'].toFixed(2)}</span></button>
                            </div>
                        </div>

                        <div>
                            <p class="text-[10px] text-gray-400 uppercase mb-2">Total Goals (Over/Under)</p>
                            <div class="grid grid-cols-4 gap-2 h-32 overflow-y-auto pr-1">
                `;

                // Loop 0.5 to 6.5 dynamically
                ["0.5", "1.5", "2.5", "3.5", "4.5", "5.5", "6.5"].forEach(line => {
                    if (match.odds[`O${line}`]) {
                        html += `
                            <button onclick="toggleBet(${match.id}, '${match.home} vs ${match.away}', 'Over ${line}', ${match.odds[`O${line}`]}, 'O${line}')" class="border ${isSelected(`O${line}`) ? 'border-neon-accent bg-neon-accent/10 text-neon-accent' : 'border-gray-700 bg-obsidian-surface text-gray-300'} p-1.5 rounded text-[10px] hover:border-gray-400 transition-colors">O${line} <br><span class="font-bold font-mono text-xs">${match.odds[`O${line}`].toFixed(2)}</span></button>
                            <button onclick="toggleBet(${match.id}, '${match.home} vs ${match.away}', 'Under ${line}', ${match.odds[`U${line}`]}, 'U${line}')" class="border ${isSelected(`U${line}`) ? 'border-neon-accent bg-neon-accent/10 text-neon-accent' : 'border-gray-700 bg-obsidian-surface text-gray-300'} p-1.5 rounded text-[10px] hover:border-gray-400 transition-colors">U${line} <br><span class="font-bold font-mono text-xs">${match.odds[`U${line}`].toFixed(2)}</span></button>
                        `;
                    }
                });

                html += `</div></div></div>`;
                card.innerHTML = html;
                feed.appendChild(card);
            });
        }

        // --- 4. Slip Builder Logic ---
        function toggleBet(matchId, matchName, marketLabel, odds, marketKey) {
            if (portfolioSlip[matchId] && portfolioSlip[matchId].marketKey === marketKey) {
                delete portfolioSlip[matchId]; // Deselect if already active
            } else {
                portfolioSlip[matchId] = { matchName, marketLabel, odds, marketKey }; // Add to slip
            }
            
            // Re-render feed to update button colors, then update the slip
            fetchRealGames(); 
            updateSlipUI();
        }

        function removeBet(matchId) {
            delete portfolioSlip[matchId];
            fetchRealGames();
            updateSlipUI();
        }

        function updateSlipUI() {
            const slipContainer = document.getElementById('slipItems');
            const emptyMsg = document.getElementById('emptySlip');
            slipContainer.innerHTML = '';
            
            const keys = Object.keys(portfolioSlip);
            document.getElementById('slipCount').innerText = keys.length;

            if (keys.length === 0) {
                slipContainer.appendChild(emptyMsg);
                document.getElementById('totalOddsText').innerText = "0.00";
                document.getElementById('generatedCodeBox').classList.add('hidden');
                emptyMsg.classList.remove('hidden');
                return;
            }

            emptyMsg.classList.add('hidden');
            let totalOdds = 1;

            keys.forEach(id => {
                const bet = portfolioSlip[id];
                totalOdds *= bet.odds;

                const div = document.createElement('div');
                div.className = "bg-obsidian-base border border-gray-800 p-2 rounded relative";
                div.innerHTML = `
                    <button onclick="removeBet(${id})" class="absolute top-1 right-2 text-gray-600 hover:text-red-500 text-xs">x</button>
                    <p class="text-[10px] text-gray-400 truncate pr-4">${bet.matchName}</p>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-xs text-white font-bold">${bet.marketLabel}</span>
                        <span class="text-neon-accent font-mono text-xs">${bet.odds.toFixed(2)}</span>
                    </div>
                `;
                slipContainer.appendChild(div);
            });

            document.getElementById('totalOddsText').innerText = totalOdds.toFixed(2);
        }

        // --- 5. Generate Puntrr-style Betting Code ---
        function generateCode() {
            if (Object.keys(portfolioSlip).length === 0) {
                alert("Add at least one prediction to generate a code.");
                return;
            }

            const bookie = document.getElementById('bookieSelect').value;
            const prefix = bookie === 'Bet9ja' ? 'B9' : bookie === '1xBet' ? '1X' : 'SP';
            const randomHash = Math.random().toString(36).substring(2, 7).toUpperCase();
            
            document.getElementById('displayBookie').innerText = bookie;
            document.getElementById('finalCode').innerText = `${prefix}-${randomHash}`;
            document.getElementById('generatedCodeBox').classList.remove('hidden');
        }

        // Boot up
        fetchRealGames();
    </script>
</body>
</html>
